<!DOCTYPE html>
<html>
<head>
  <title>home</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    a {
      display: block;
      margin: 10px;
      font-size: 24px;
      color: white;
      text-decoration: none;
      transition: 0.2s;
    }

    a:hover {
      transform: scale(1.2);
      text-shadow: 0 0 10px white;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="che/">che</a>
    <a href="mock/">mock</a>
