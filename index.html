<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>home</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    a {
      display: block;
      margin: 12px 0;
      font-size: clamp(20px, 6vw, 24px);
      color: white;
      text-decoration: none;
      transition: 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    a:hover {
      transform: scale(1.1);
      text-shadow: 0 0 10px white;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="che/">che</a>
    <a href="mock/">mock</a>
    <a href="0/">june</a>
    <a href="sasha/">sasha</a>
    <a href="simmy/">simmy</a>
    <a href="hollie/">hollie</a>
  </div>
</body>
</html>
